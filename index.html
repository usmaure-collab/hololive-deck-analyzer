<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analista de Decks Hololive OCG</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23171334' stroke='%2338bded' stroke-width='6'/><text x='50' y='75' font-family='sans-serif' font-size='65' font-weight='900' fill='url(%23grad)' text-anchor='middle'>h</text><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='0%'><stop offset='0%' stop-color='%23534B88'/><stop offset='100%' stop-color='%2338bded'/></linearGradient></defs></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <noscript>Esta aplicacion necesita JavaScript local del navegador para funcionar.</noscript>
    </div>
    
    <!-- Music Player Widget -->
    <div id="yt-player-container" style="position: absolute; left: -9999px; width: 10px; height: 10px; pointer-events: none; opacity: 0;"></div>
    <div id="music-widget" class="music-widget calliope-theme" onclick="if(this.classList.contains('minimized') && window.MusicPlayer) window.MusicPlayer.toggleMinimize()">
      <button class="music-widget-toggle" onclick="event.stopPropagation(); if(window.MusicPlayer) window.MusicPlayer.toggleMinimize()" title="Alternar Música">
        <svg class="death-sensei-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width: 24px; height: 24px; filter: drop-shadow(0 0 2px #ff3366);">
          <circle cx="50" cy="50" r="42" fill="#1a0505" stroke="#ff3366" stroke-width="4"/>
          <circle cx="50" cy="50" r="22" fill="#ffffff" />
          <path d="M 38 40 L 44 32 L 56 32 L 62 40 Z" fill="#000000" />
          <circle cx="44" cy="42" r="4" fill="#000000" />
          <circle cx="56" cy="42" r="4" fill="#000000" />
          <path d="M 46 52 Q 50 55 54 52" fill="transparent" stroke="#000000" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
      <div class="music-info">
        <span class="music-title">lo-fi & chill mix II</span>
      </div>
      <div class="music-controls">
        <button id="music-play-btn" class="icon-btn holo-play" onclick="event.stopPropagation(); if(window.MusicPlayer) window.MusicPlayer.toggle()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24">
            <polygon points="35,25 85,55 35,85" fill="#38bded" stroke="#38bded" stroke-linejoin="round" stroke-width="10" />
            <polygon points="25,15 75,45 25,75" fill="#ffffff" stroke="#ffffff" stroke-linejoin="round" stroke-width="10" />
          </svg>
        </button>
        <input type="range" id="music-volume-slider" class="deadbeat-slider-slim" min="0" max="100" value="50" oninput="if(window.MusicPlayer) window.MusicPlayer.setVolume(this.value)" onclick="event.stopPropagation()">
        <span class="volume-pct" id="volume-pct" style="font-size: 0.75rem; min-width: 28px; text-align: right; color: var(--muted); font-family: monospace;">50%</span>
      </div>
    </div>

    <script src="src/data.js"></script>
    <script src="src/sfx.js"></script>
    <script src="src/music-player.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
